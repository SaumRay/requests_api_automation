# ─────────────────────────────────────────────
# pytest configuration
# ─────────────────────────────────────────────

[pytest]

# Where pytest should look for tests
testpaths = tests

# Output verbosity + HTML + Allure reporting
addopts =
    -v
    --tb=short
    --html=reports/test_report.html
    --self-contained-html
    --alluredir=reports/allure-results

# Custom markers (avoids PytestUnknownMarkWarning)
markers =
    smoke: Quick sanity checks — run after every build
    regression: Full regression suite
    auth: Authentication related tests
    users: User management tests
    posts: Blog post CRUD tests
    negative: Negative / failure scenario tests
    schema: Schema validation tests
    data_driven: Parametrized data-driven tests