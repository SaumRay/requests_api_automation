# ─────────────────────────────────────────────────────────────────────
# GitHub Actions CI Pipeline
# Project  : requests_api_automation
# Trigger  : Push to main
# Runner   : pytest + allure reports  (matches run_tests.sh / pytest.ini)
# Secrets  : API key + credentials injected into config/config.yaml
#            at runtime — config.yaml is gitignored, never committed.
# Pages    : Allure report published to GitHub Pages after every run
#            Live URL: https://<YOUR_USERNAME>.github.io/<YOUR_REPO>/
# ─────────────────────────────────────────────────────────────────────

name: API Automation Tests

on:
  push:
    branches:
      - main

# Required for GitHub Pages deployment
permissions:
  contents: write

jobs:
  test:
    name: Run Pytest + Generate Allure Report
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout source code ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python 3.11 ────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"                   # caches pip downloads between runs

      # ── 3. Install Python dependencies ──────────────────────────────
      # Installs everything in requirements.txt:
      #   requests, pytest, pytest-html, allure-pytest, jsonschema,
      #   PyYAML, python-dotenv, pytest-clarity, pytest-xdist
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Install Allure CLI ────────────────────────────────────────
      # Needed to run: allure generate (converts raw JSON -> HTML report)
      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      # ── 5. Reconstruct config/config.yaml from GitHub Secrets ───────
      # config/config.yaml is gitignored (contains your real credentials).
      # We copy config/config.yaml.example and inject real values from
      # secrets stored in:
      #   GitHub -> Your Repo -> Settings -> Secrets and variables -> Actions
      #
      # Secrets required (one-time setup):
      #   REQRES_API_KEY   -> your actual ReqRes API key
      #   VALID_EMAIL      -> eve.holt@reqres.in
      #   VALID_PASSWORD   -> cityslicka
      #
      # The real config.yaml only exists in the CI runner memory
      # during this job -- never stored, never logged.
      - name: Reconstruct config.yaml from GitHub Secrets
        run: |
          cp config/config.yaml.example config/config.yaml
          sed -i "s|YOUR_API_KEY_HERE|${{ secrets.REQRES_API_KEY }}|g"       config/config.yaml
          sed -i "s|YOUR_VALID_EMAIL_HERE|${{ secrets.VALID_EMAIL }}|g"       config/config.yaml
          sed -i "s|YOUR_VALID_PASSWORD_HERE|${{ secrets.VALID_PASSWORD }}|g" config/config.yaml

      # ── 6. Create reports directory ──────────────────────────────────
      # pytest.ini writes reports to reports/ -- must exist before pytest runs
      - name: Create reports directory
        run: mkdir -p reports/allure-results

      # ── 7. Run full test suite ───────────────────────────────────────
      # pytest.ini already sets:
      #   -v, --tb=short, --html=reports/test_report.html,
      #   --self-contained-html, --alluredir=reports/allure-results
      # So we just call bare pytest here -- no duplicate flags needed.
      # The 3 xfail tests (ReqRes demo regressions) show as XFAIL and
      # do NOT cause the pipeline to fail.
      - name: Run pytest
        run: pytest
        continue-on-error: true         # publish reports even if tests fail

      # ── 8. Fetch previous Allure history from gh-pages ───────────────
      # Allure can show a trend graph across runs (pass rate over time).
      # To do this it needs the history/ folder from the PREVIOUS report.
      # We check out the gh-pages branch and copy history/ into the fresh
      # allure-results so the new report includes the trend.
      # If gh-pages doesn't exist yet (first run) this step is skipped safely.
      - name: Fetch Allure history from gh-pages
        if: always()
        run: |
          if git fetch origin gh-pages 2>/dev/null; then
            git checkout origin/gh-pages -- history/ 2>/dev/null || true
            cp -r history reports/allure-results/history 2>/dev/null || true
            echo "History restored from gh-pages."
          else
            echo "No gh-pages branch yet — skipping history restore (first run)."
          fi

      # ── 9. Generate Allure HTML report ───────────────────────────────
      # Converts raw JSON + history -> full HTML report in reports/allure-report
      - name: Generate Allure HTML report
        if: always()
        run: |
          allure generate reports/allure-results \
            -o reports/allure-report \
            --clean

      # ── 10. Upload Allure HTML report as CI artifact ─────────────────
      # Backup download via Actions -> Artifacts -> allure-report
      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/
          retention-days: 14

      # ── 11. Upload pytest-html report as CI artifact ─────────────────
      # Single-file HTML report -- quick pass/fail overview.
      - name: Upload HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-report
          path: reports/test_report.html
          retention-days: 14

      # ── 12. Publish Allure report to GitHub Pages ────────────────────
      # Pushes reports/allure-report/ to the gh-pages branch.
      # GitHub Pages serves that branch at:
      #   https://<YOUR_USERNAME>.github.io/<YOUR_REPO>/
      #
      # Also copies the history/ folder back into gh-pages root so the
      # NEXT run can restore it in Step 8 (trend graph continuity).
      #
      # Requires: permissions: contents: write  (set at top of this file)
      # Requires: Settings -> Pages -> Source: gh-pages branch / (root)
      - name: Publish Allure report to GitHub Pages
        if: always()
        run: |
          # Configure git identity for the push
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Prepare a clean deploy folder
          mkdir -p gh-pages-deploy

          # Copy the full generated report
          cp -r reports/allure-report/. gh-pages-deploy/

          # Preserve history/ in gh-pages root for next run's trend graph
          cp -r reports/allure-report/history gh-pages-deploy/history 2>/dev/null || true

          # Switch to (or create) the gh-pages branch
          git checkout --orphan gh-pages-tmp

          # Wipe everything and replace with the fresh report
          git rm -rf . --quiet
          cp -r gh-pages-deploy/. .

          # Commit and force-push to gh-pages
          git add -A
          git commit -m "Deploy Allure report — $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:gh-pages --force

          echo "================================================"
          echo "  Allure report published to GitHub Pages!"
          echo "  URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "================================================"